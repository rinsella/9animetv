# Optional Render blueprint. Push this repo and click "New + Blueprint" on Render.
services:
  - type: web
    name: 9animetv-mirror
    env: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: UPSTREAM_HOST
        value: 9animetv.ing
      - key: UPSTREAM_PROTOCOL
        value: https
      - key: PUBLIC_PROTOCOL
        value: https
      - key: FORCE_INDEX
        value: "1"
      - key: NODE_ENV
        value: production
